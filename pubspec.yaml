name: stellar_blocks
description: A block-fitting puzzle game where every cleared line lights a star in a constellation.
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  flame_audio: ^2.10.0
  shared_preferences: ^2.3.0
  google_mobile_ads: ^5.1.0
  in_app_purchase: ^3.2.0
  games_services: ^4.0.0
  logging: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/constellations.json
    - assets/audio/
    - assets/images/
